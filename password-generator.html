<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureKey — Password Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --panel:     #181c26;
      --border:    #222738;
      --border-hi: #2e3450;
      --accent:    #3d6ccc;
      --accent-lo: #1e2f5a;
      --accent-hi: #5b8aff;
      --text:      #c4c9d8;
      --text-lo:   #5c6480;
      --text-hi:   #e8eaf2;
      --green:     #2ea86a;
      --green-lo:  #0f3325;
      --amber:     #c99a2e;
      --amber-lo:  #352a0e;
      --red:       #c94040;
      --red-lo:    #3a1212;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .logo-mark {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .15em;
      color: var(--accent-hi);
      background: var(--accent-lo);
      border: 1px solid var(--accent);
      padding: 3px 8px;
      border-radius: 3px;
    }
    header h1 {
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 500;
      color: var(--text-hi);
      letter-spacing: .04em;
    }
    header p {
      margin-left: auto;
      font-size: 11px;
      letter-spacing: .08em;
      color: var(--text-lo);
      text-transform: uppercase;
    }

   
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
    }
    .card-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text-lo);
      margin-bottom: 18px;
    }

    .output-wrap {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--border-hi);
      border-radius: 5px;
      padding: 18px 56px 18px 18px;
      min-height: 58px;
      display: flex;
      align-items: center;
    }
    #output {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 400;
      color: var(--text-hi);
      word-break: break-all;
      line-height: 1.6;
      flex: 1;
      letter-spacing: .06em;
    }
    #output.placeholder { color: var(--text-lo); font-size: 13px; font-weight: 300; }

    .copy-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent-lo);
      border: 1px solid var(--accent);
      color: var(--accent-hi);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: background .18s, color .18s;
    }
    .copy-btn:hover { background: var(--accent); color: #fff; }
    .copy-btn.copied { background: var(--green); border-color: var(--green); color: #fff; }

    .strength-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }
    .bar-track {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width .4s, background .4s;
    }
    .strength-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      min-width: 60px;
      text-align: right;
    }

  
    .options-grid {
      display: grid;
      gap: 20px;
    }


    .length-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .length-row label {
      font-size: 12px;
      color: var(--text);
      min-width: 46px;
    }
    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border-hi);
      border-radius: 99px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--accent-hi);
      border-radius: 50%;
      border: 2px solid var(--bg);
    }
    #len-val {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent-hi);
      min-width: 28px;
      text-align: right;
    }


    .toggles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .toggle-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      transition: border-color .18s;
    }
    .toggle-item:hover { border-color: var(--border-hi); }
    .toggle-item.active { border-color: var(--accent); background: var(--accent-lo); }
    .toggle-item input { display: none; }
    .toggle-dot {
      width: 30px; height: 16px;
      background: var(--border);
      border-radius: 99px;
      position: relative;
      flex-shrink: 0;
      transition: background .18s;
    }
    .toggle-dot::after {
      content: '';
      position: absolute;
      left: 2px; top: 2px;
      width: 12px; height: 12px;
      background: var(--text-lo);
      border-radius: 50%;
      transition: left .18s, background .18s;
    }
    .toggle-item.active .toggle-dot { background: var(--accent); }
    .toggle-item.active .toggle-dot::after { left: 16px; background: #fff; }
    .toggle-text { font-size: 12px; color: var(--text); }
    .toggle-item.active .toggle-text { color: var(--text-hi); }

    .gen-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .18s;
    }
    .gen-btn:hover { background: var(--accent-hi); }
  
    .checker-wrap { display: grid; gap: 16px; }
    .input-field {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border-hi);
      border-radius: 5px;
      padding: 13px 16px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text-hi);
      outline: none;
      transition: border-color .18s;
    }
    .input-field::placeholder { color: var(--text-lo); font-size: 12px; }
    .input-field:focus { border-color: var(--accent); }

    .check-result {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 16px;
      display: none;
    }
    .check-result.visible { display: block; }

    .score-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .score-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .14em;
      padding: 4px 10px;
      border-radius: 3px;
      text-transform: uppercase;
    }
    .score-badge.very-strong { background: var(--green-lo); color: var(--green); border: 1px solid var(--green); }
    .score-badge.strong      { background: #0e2d1f; color: #45c585; border: 1px solid #45c585; }
    .score-badge.moderate    { background: var(--amber-lo); color: var(--amber); border: 1px solid var(--amber); }
    .score-badge.weak        { background: #3a2210; color: #c9772e; border: 1px solid #c9772e; }
    .score-badge.very-weak   { background: var(--red-lo); color: var(--red); border: 1px solid var(--red); }

    .criteria-list { display: grid; gap: 6px; }
    .crit {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-lo);
    }
    .crit.pass { color: var(--green); }
    .crit.fail { color: var(--text-lo); }
    .crit-icon {
      font-family: var(--mono);
      font-size: 10px;
      width: 16px;
      text-align: center;
    }

   
    .history-list { display: grid; gap: 8px; }
    .hist-empty {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-lo);
      letter-spacing: .06em;
      padding: 12px 0;
    }
    .hist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px 14px;
      transition: border-color .15s;
    }
    .hist-item:hover { border-color: var(--border-hi); }
    .hist-pw {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-hi);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: .04em;
    }
    .hist-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-lo);
      white-space: nowrap;
    }
    .hist-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .1em;
      padding: 2px 7px;
      border-radius: 2px;
      text-transform: uppercase;
    }
    .hist-copy {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-lo);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .1em;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .hist-copy:hover { border-color: var(--accent); color: var(--accent-hi); }
    .clear-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      color: var(--text-lo);
      background: none;
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      float: right;
      margin-top: -36px;
      transition: border-color .15s, color .15s;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    @media (max-width: 520px) {
      .toggles { grid-template-columns: 1fr; }
      header p { display: none; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <header>
    <span class="logo-mark">SEC</span>
    <h1>SecureKey</h1>
    <p>Password Utility v1.0</p>
  </header>

  <div class="card">
    <p class="card-title">01 — Generate Password</p>

    <div class="output-wrap">
      <span id="output" class="placeholder">Press Generate to create a password</span>
      <button class="copy-btn" id="copy-btn" onclick="copyMain()">COPY</button>
    </div>

    <div class="strength-row">
      <div class="bar-track"><div class="bar-fill" id="gen-bar"></div></div>
      <span class="strength-label" id="gen-label" style="color:var(--text-lo)">—</span>
    </div>

    <div class="options-grid" style="margin-top:22px;">
      
      <div class="length-row">
        <label>Length</label>
        <input type="range" id="length" min="6" max="64" value="16" oninput="document.getElementById('len-val').textContent=this.value"/>
        <span id="len-val">16</span>
      </div>

      <div class="toggles">
        <label class="toggle-item active" id="tog-upper">
          <input type="checkbox" id="opt-upper" checked/>
          <span class="toggle-dot"></span>
          <span class="toggle-text">Uppercase  A–Z</span>
        </label>
        <label class="toggle-item active" id="tog-lower">
          <input type="checkbox" id="opt-lower" checked/>
          <span class="toggle-dot"></span>
          <span class="toggle-text">Lowercase  a–z</span>
        </label>
        <label class="toggle-item active" id="tog-num">
          <input type="checkbox" id="opt-num" checked/>
          <span class="toggle-dot"></span>
          <span class="toggle-text">Numbers  0–9</span>
        </label>
        <label class="toggle-item" id="tog-sym">
          <input type="checkbox" id="opt-sym"/>
          <span class="toggle-dot"></span>
          <span class="toggle-text">Symbols  !@#$</span>
        </label>
      </div>

      <button class="gen-btn" onclick="generatePassword()">Generate Password</button>
    </div>
  </div>

  <div class="card">
    <p class="card-title">02 — Analyse a Password</p>
    <div class="checker-wrap">
      <input class="input-field" type="text" id="check-input" placeholder="Type or paste a password to analyse…" oninput="analysePassword(this.value)"/>
      <div class="check-result" id="check-result">
        <div class="score-row">
          <span class="score-badge" id="check-badge">—</span>
          <div class="bar-track" style="flex:1"><div class="bar-fill" id="check-bar"></div></div>
        </div>
        <div class="criteria-list" id="check-criteria"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-title">03 — Recent Passwords</p>
    <button class="clear-btn" onclick="clearHistory()">CLEAR ALL</button>
    <div class="history-list" id="history-list">
      <p class="hist-empty" id="hist-empty">No passwords generated yet.</p>
    </div>
  </div>

</div>

<script>
  const UPPER  = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const LOWER  = 'abcdefghijklmnopqrstuvwxyz';
  const NUMS   = '0123456789';
  const SYMS   = '!@#$%^&*()_+-=[]{}|;:,.<>?';

  let history = [];

  ['upper','lower','num','sym'].forEach(k => {
    const tog = document.getElementById(`tog-${k}`);
    const cb  = document.getElementById(`opt-${k}`);
    tog.addEventListener('click', () => {
      cb.checked = !cb.checked;
      tog.classList.toggle('active', cb.checked);
    });
  });

  function generatePassword() {
    const len = +document.getElementById('length').value;
    const useUpper = document.getElementById('opt-upper').checked;
    const useLower = document.getElementById('opt-lower').checked;
    const useNum   = document.getElementById('opt-num').checked;
    const useSym   = document.getElementById('opt-sym').checked;

    let pool = '';
    let guaranteed = [];
    if (useUpper) { pool += UPPER; guaranteed.push(randChar(UPPER)); }
    if (useLower) { pool += LOWER; guaranteed.push(randChar(LOWER)); }
    if (useNum)   { pool += NUMS;  guaranteed.push(randChar(NUMS));  }
    if (useSym)   { pool += SYMS;  guaranteed.push(randChar(SYMS));  }

    if (!pool) { alert('Select at least one character type.'); return; }

    let chars = [...guaranteed];
    while (chars.length < len) chars.push(randChar(pool));
    chars = shuffle(chars).slice(0, len);
    const pw = chars.join('');

    const el = document.getElementById('output');
    el.textContent = pw;
    el.classList.remove('placeholder');

    const s = score(pw);
    renderBar('gen-bar', 'gen-label', s);
    addHistory(pw, s);
  }

  function randChar(str) {
    return str[Math.floor(Math.random() * str.length)];
  }
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

 
  function copyMain() {
    const el = document.getElementById('output');
    if (el.classList.contains('placeholder')) return;
    navigator.clipboard.writeText(el.textContent);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'COPIED';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1800);
  }

  function score(pw) {
    let s = 0;
    if (pw.length >= 8)  s += 1;
    if (pw.length >= 12) s += 1;
    if (pw.length >= 16) s += 1;
    if (/[A-Z]/.test(pw)) s += 1;
    if (/[a-z]/.test(pw)) s += 1;
    if (/[0-9]/.test(pw)) s += 1;
    if (/[^A-Za-z0-9]/.test(pw)) s += 2;
    return s; 
  }

  function strengthLabel(s) {
    if (s <= 1) return { text: 'Very Weak',   cls: 'very-weak',   color: '#c94040', pct: 12  };
    if (s <= 3) return { text: 'Weak',         cls: 'weak',        color: '#c9772e', pct: 30  };
    if (s <= 5) return { text: 'Moderate',     cls: 'moderate',    color: '#c99a2e', pct: 55  };
    if (s <= 6) return { text: 'Strong',       cls: 'strong',      color: '#45c585', pct: 75  };
                return { text: 'Very Strong',  cls: 'very-strong', color: '#2ea86a', pct: 100 };
  }

  function renderBar(barId, labelId, s) {
    const info = strengthLabel(s);
    const bar  = document.getElementById(barId);
    bar.style.width      = info.pct + '%';
    bar.style.background = info.color;
    if (labelId) {
      const lbl = document.getElementById(labelId);
      lbl.textContent = info.text;
      lbl.style.color = info.color;
    }
    return info;
  }

  function analysePassword(pw) {
    const res = document.getElementById('check-result');
    if (!pw) { res.classList.remove('visible'); return; }
    res.classList.add('visible');

    const s    = score(pw);
    const info = renderBar('check-bar', null, s);

    const badge = document.getElementById('check-badge');
    badge.textContent = info.text;
    badge.className   = 'score-badge ' + info.cls;

    const criteria = [
      { label: 'At least 8 characters',               pass: pw.length >= 8  },
      { label: 'At least 12 characters',              pass: pw.length >= 12 },
      { label: 'At least 16 characters',              pass: pw.length >= 16 },
      { label: 'Contains uppercase letters (A–Z)',    pass: /[A-Z]/.test(pw) },
      { label: 'Contains lowercase letters (a–z)',    pass: /[a-z]/.test(pw) },
      { label: 'Contains numbers (0–9)',               pass: /[0-9]/.test(pw) },
      { label: 'Contains symbols (!@#$…)',             pass: /[^A-Za-z0-9]/.test(pw) },
    ];

    document.getElementById('check-criteria').innerHTML = criteria.map(c => `
      <div class="crit ${c.pass ? 'pass' : 'fail'}">
        <span class="crit-icon">${c.pass ? '✓' : '·'}</span>
        ${c.label}
      </div>
    `).join('');
  }

  function addHistory(pw, s) {
    const info = strengthLabel(s);
    const now  = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    history.unshift({ pw, info, time });
    if (history.length > 10) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const list  = document.getElementById('history-list');
    const empty = document.getElementById('hist-empty');

    if (!history.length) {
      empty.style.display = 'block';
      list.querySelectorAll('.hist-item').forEach(e => e.remove());
      return;
    }
    empty.style.display = 'none';

    list.querySelectorAll('.hist-item').forEach(e => e.remove());
    history.forEach((entry, i) => {
      const div = document.createElement('div');
      div.className = 'hist-item';
      div.innerHTML = `
        <span class="hist-pw">${entry.pw}</span>
        <span class="hist-badge" style="background:${entry.info.color}22;color:${entry.info.color};border:1px solid ${entry.info.color}44">${entry.info.text}</span>
        <span class="hist-meta">${entry.time}</span>
        <button class="hist-copy" onclick="copyHistItem(${i}, this)">COPY</button>
      `;
      list.appendChild(div);
    });
  }

  function copyHistItem(i, btn) {
    navigator.clipboard.writeText(history[i].pw);
    const orig = btn.textContent;
    btn.textContent = 'DONE';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 1500);
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }
</script>
</body>
</html>
